<!DOCTYPE html>
<html>
  <head>
    <title>Interactive Page with Blockly</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 20px;
      }
      #message {
        margin-top: 20px;
        font-size: 18px;
        color: #007acc;
      }
      #blocklyDiv {
        margin: 20px auto;
        height: 480px;
        width: 600px;
        border: 1px solid #ccc;
      }
      #output {
        margin-top: 20px;
        text-align: left;
        white-space: pre-wrap;
        background: #f9f9f9;
        padding: 10px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>This is my first GitHub.io page.</h1>
    <a href="javascript:void(0)" onclick="showMessage()">Click me to display a message!</a>
    <div id="message"></div>

    <h2>Blockly Playground</h2>
    <div id="blocklyDiv"></div>

    <xml id="toolbox" style="display: none">
      <category name="Logic" colour="210">
        <block type="controls_if"></block>
        <block type="logic_compare"></block>
      </category>
      <category name="Math" colour="230">
        <block type="math_number"></block>
        <block type="math_arithmetic"></block>
      </category>
      <category name="Text" colour="160">
        <block type="text"></block>
        <block type="text_print"></block>
        <block type="sixseven"></block> <!-- custom 67 block -->
      </category>
      <category name="Loops" colour="120">
        <block type="controls_repeat_ext"></block>
      </category>
      <category name="Events" colour="65">
        <block type="key_pressed"></block>
      </category>
      <category name="Variables" custom="VARIABLE" colour="330"></category>
      <category name="Functions" custom="PROCEDURE" colour="290"></category>
    </xml>

    <button onclick="showCode()">Show Generated Code</button>
    <button onclick="runCode()">Run Code</button>
    <pre id="output"></pre>

    <script>
      function showMessage() {
        const msg = prompt("Type Message");
        if (msg) {
          document.getElementById("message").textContent = msg;
        }
      }

      const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox')
      });

      function showCode() {
        const code = Blockly.JavaScript.workspaceToCode(workspace);
        document.getElementById("output").textContent = code;
      }

      function runCode() {
        const code = Blockly.JavaScript.workspaceToCode(workspace);
        try {
          eval(code);
        } catch (e) {
          alert("Error: " + e);
        }
      }

      // Custom key_pressed block
      Blockly.Blocks['key_pressed'] = {
        init: function() {
          this.appendDummyInput()
              .appendField("when")
              .appendField(new Blockly.FieldTextInput("space"), "key")
              .appendField("key pressed");
          this.appendStatementInput("DO")
              .appendField("do");
          this.setColour(45);
          this.setTooltip("Runs code when a specific key is pressed");
          this.setHelpUrl("");
        }
      };

      Blockly.JavaScript['key_pressed'] = function(block) {
        const key = block.getFieldValue('key');
        const statements = Blockly.JavaScript.statementToCode(block, 'DO');
        const code = `
          document.addEventListener('keydown', function(e) {
            if (e.key === '${key}') {
              ${statements}
            }
          });
        `;
        return code;
      };

      // Custom sixseven block (returns "67" as a string)
      Blockly.Blocks['sixseven'] = {
        init: function() {
          this.jsonInit({
            "type": "sixseven",
            "message0": "67",
            "output": "String",
            "colour": 230,
            "tooltip": "Returns the string '67'",
            "helpUrl": ""
          });
        }
      };

      Blockly.JavaScript['sixseven'] = function(block) {
        return ['"67"', Blockly.JavaScript.ORDER_ATOMIC];
      };
    </script>

    <h1>Embedded Blockly Demo</h1>

    <!-- Embed the Raspberry Pi Foundation Blockly demo -->
    <iframe 
      src="https://raspberrypifoundation.github.io/blockly-samples/examples/devsite-landing-demo/index.html" 
      title="Blockly Demo">
    </iframe>
  </body>
</html>
