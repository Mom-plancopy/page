<!DOCTYPE html>
<html>
  <head>
    <title>Interactive Page with Blockly</title>
    <!-- Load Blockly -->
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 20px;
      }
      #message {
        margin-top: 20px;
        font-size: 18px;
        color: #007acc;
      }
      #blocklyDiv {
        margin: 20px auto;
        height: 480px;
        width: 600px;
        border: 1px solid #ccc;
      }
      #output {
        margin-top: 20px;
        text-align: left;
        white-space: pre-wrap;
        background: #f9f9f9;
        padding: 10px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>This is my first GitHub.io page.</h1>
    <a href="javascript:void(0)" onclick="showMessage()">Click me to display a message!</a>
    <div id="message"></div>

    <!-- Blockly editor container -->
    <h2>Blockly Playground</h2>
    <div id="blocklyDiv"></div>

    <!-- Toolbox definition -->
    <xml id="toolbox" style="display: none">
      <category name="Logic" colour="210">
        <block type="controls_if"></block>
        <block type="logic_compare"></block>
      </category>
      <category name = "Math" colour = "230">
        <block type="math_number"></block>
        <block type="math_arithmetic"></block>
      </category>
      <category name="Text" color="160">
        <block type="text"></block>
        <block type="text_print"></block>
      </category>
      <category name="Loops" colour="120">
        <block type="controls_repeat_ext"></block>
      </category>
    </xml>

    <!-- Button to show generated code -->
    <button onclick="showCode()">Show Generated Code</button>
    <pre id="output"></pre>

    <script>
      function showMessage() {
        const msg = prompt("Type Message");
        if (msg) {
          document.getElementById("message").textContent = msg;
        }
      }

      // Inject Blockly into the div
      const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox')
      });

      // Show generated JavaScript code
      function showCode() {
        const code = Blockly.JavaScript.workspaceToCode(workspace);
        document.getElementById("output").textContent = code;
      }
    </script>
  </body>
</html>
