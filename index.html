<!DOCTYPE html>
<html>
  <head>
    <title>Interactive Page with Blockly</title>
    <!-- Load Blockly -->
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 20px;
      }
      #message {
        margin-top: 20px;
        font-size: 18px;
        color: #007acc;
      }
      #blocklyDiv {
        margin: 20px auto;
        height: 480px;
        width: 600px;
        border: 1px solid #ccc;
      }
      #output {
        margin-top: 20px;
        text-align: left;
        white-space: pre-wrap;
        background: #f9f9f9;
        padding: 10px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>This is my first GitHub.io page.</h1>
    <a href="javascript:void(0)" onclick="showMessage()">Click me to display a message!</a>
    <div id="message"></div>

    <!-- Blockly editor container -->
    <h2>Blockly Playground</h2>
    <div id="blocklyDiv"></div>

    <!-- Toolbox definition -->
    <xml id="toolbox" style="display: none">
      <category name="Logic" colour="210">
        <block type="controls_if"></block>
        <block type="logic_compare"></block>
      </category>
      <category name="Math" colour="230">
        <block type="math_number"></block>
        <block type="math_arithmetic"></block>
      </category>
      <category name="Text" colour="160">
        <block type="text"></block>
        <block type="text_print"></block>
      </category>
      <category name="Loops" colour="120">
        <block type="controls_repeat_ext"></block>
      </category>
      <!-- Events category -->
      <category name="Events" colour="65">
        <block type="key_pressed"></block>
      </category>
      <!-- Variables category -->
      <category name="Variables" custom="VARIABLE" colour="330"></category>
      <!-- Functions category -->
      <category name="Functions" custom="PROCEDURE" colour="290"></category>
    </xml>

    <!-- Buttons -->
    <button onclick="showCode()">Show Generated Code</button>
    <button onclick="runCode()">Run Code</button>
    <pre id="output"></pre>

    <script>
      function showMessage() {
        const msg = prompt("Type Message");
        if (msg) {
          document.getElementById("message").textContent = msg;
        }
      }

      // Inject Blockly into the div
      const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox')
      });

      // Show generated JavaScript code
      function showCode() {
        const code = Blockly.JavaScript.workspaceToCode(workspace);
        document.getElementById("output").textContent = code;
      }

      // Run generated JavaScript code
      function runCode() {
        const code = Blockly.JavaScript.workspaceToCode(workspace);
        try {
          eval(code); // ⚠️ executes user-generated code
        } catch (e) {
          alert("Error: " + e);
        }
      }

      // Define the custom key_pressed block
      Blockly.Blocks['key_pressed'] = {
        init: function() {
          this.jsonInit({
            "type": "key_pressed",
            "message0": "when %1 key pressed",
            "args0": [
              {
                "type": "field_input",
                "name": "key",
                "text": "space"
              }
            ],
            "inputsInline": false,
            "nextStatement": null,
            "colour": 45,
            "tooltip": "Runs code when a key is pressed",
            "helpUrl": ""
          });
        }
      };

      // Generator for key_pressed block
      Blockly.JavaScript['key_pressed'] = function(block) {
        const key = block.getFieldValue('key');
        const code = `
          document.addEventListener('keydown', function(e) {
            if (e.key === '${key}') {
              document.getElementById("message").textContent = 'Key "${key}" pressed!';
            }
          });
        `;
        return code;
      };
    </script>
  </body>
</html>
